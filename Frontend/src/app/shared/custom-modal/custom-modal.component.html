<div *ngIf="isOpen" class="modal-overlay" (click)="onCancel()">
  <div class="modal-box" (click)="$event.stopPropagation()">

    <div class="modal-header" [ngClass]="type">
      <h3>{{ title }}</h3>
      <button class="close-btn" (click)="onCancel()" aria-label="Close dialog" style="display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 50%; border: none; background: transparent; cursor: pointer;">
        <span style="font-size: 16px; font-weight: 600; line-height: 1; font-family: sans-serif; color: var(--groups-text-secondary, #6c757d); display: block;">✕</span>
      </button>
    </div>

    <div class="modal-body">
      <p>{{ message }}</p>
    </div>

    <div class="modal-footer">
      <button *ngIf="showCancel" class="btn btn-secondary" (click)="onCancel()">
        Cancel
      </button>
      <button class="btn btn-primary" (click)="onConfirm()">
        OK
      </button>
    </div>

  </div>
</div>
